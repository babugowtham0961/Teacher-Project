<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<style>
body {
    font-family: Arial;
    background: #ff9a00;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}
input, button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
}
a {
    font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Teacher Login</h2>
    <form action="TeacherLoginServlet" method="post">
    <input type="text" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

    <p>Don't have an account? <a href="teacher.html">Register</a></p>
</div>

</body>
</html>
